services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    entrypoint: ["/bin/sh", "/etc/nginx/entrypoint.sh"]
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./snippets:/etc/nginx/templates/snippets:ro
      - ./entrypoint.sh:/etc/nginx/entrypoint.sh:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    networks:
      - data_platform_net
    depends_on:
      - superset
      - airflow-webserver
      - grafana
