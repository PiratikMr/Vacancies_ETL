global:
  scrape_interval: 15s

scrape_configs:

  - job_name: airflow
    scheme: http
    metrics_path: metrics
    static_configs:
      - targets: ['statsd-exporter:9102']
        labels:
          airflow_id: 'airflow'

  - job_name: spark
    scheme: http
    metrics_path: metrics/prometheus
    static_configs:
      - targets: ['spark-master:8080', 'datanode1:8081']
        labels:
          spark_id: 'spark'

  - job_name: hadoop
    scheme: http
    metrics_path: metrics
    static_configs:
      - targets: ['namenode:8001', 'datanode1:8002']
        labels:
          hadoop_id: 'hadoop'

  - job_name: postgres
    scheme: http
    metrics_path: metrics
    static_configs:
      - targets: ['postgres-exporter:9187']